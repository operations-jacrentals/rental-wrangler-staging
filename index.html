<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1180" />               <!-- §4.4 desktop only -->
  <title>Rental Wrangler — JacTec</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Stripe.js (must load from js.stripe.com for PCI SAQ-A; card data stays in Stripe's iframe) -->
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <!-- The entire UI renders from state into #app (SPEC §2: state → render). -->
  <div id="app"></div>
  <div id="overlay-root"></div>
  <div id="toast" class="toast"></div>

  <script type="module" src="app.js"></script>
  <!-- DEV ONLY (localhost): auto-reload when app.js/style.css/index.html change on disk,
       so Jac sees edits near real-time. Never runs on app.jacrentals.com.
       Pauses while typing (focused input/textarea) so a reload can't eat a half-typed note. -->
  <script>
    if (/^(localhost|127\.0\.0\.1)$/.test(location.hostname)) (() => {
      const FILES = ['app.js', 'style.css', 'index.html'];
      const stamp = {};
      // the dev server is GET-only with no Last-Modified — checksum the body instead
      const sum = (t) => { let h = t.length; for (let i = 0; i < t.length; i += 512) h = (h * 31 + t.charCodeAt(i)) >>> 0; return h; };
      const tick = async () => {
        if (/^(INPUT|TEXTAREA)$/.test(document.activeElement?.tagName || '')) return;
        for (const f of FILES) {
          try {
            const h = sum(await (await fetch(f, { cache: 'no-store' })).text());
            if (stamp[f] !== undefined && stamp[f] !== h) { location.reload(); return; }
            stamp[f] = h;
          } catch (e) { /* server momentarily down — keep polling */ }
        }
      };
      setInterval(tick, 3000); tick();
    })();
  </script>
</body>
</html>
